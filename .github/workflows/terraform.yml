name: IaC — Terraform Provisioning

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
  workflow_dispatch: # Permite rodar manualmente se precisar

jobs:
  terraform:
    name: 🏗️ Terraform Apply
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1 # Ajuste se sua regiao for outra
      TF_VAR_ssh_key_name: "genesis-key" # <--- TROQUE PELO NOME DA SUA CHAVE SE FOR DIFERENTE

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Plan
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_ssh_key_name: ${{ secrets.SSH_KEY_NAME }}
        run: terraform plan -out=tfplan
        working-directory: ./terraform

      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_ssh_key_name: ${{ secrets.SSH_KEY_NAME }}
        run: terraform apply -auto-approve tfplan
        working-directory: ./terraform

      - name: Output EC2 Public IP
        id: ec2_ip
        run: terraform output -raw ec2_public_ip
        working-directory: ./terraform

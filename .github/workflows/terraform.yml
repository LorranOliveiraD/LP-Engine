name: IaC — Terraform Provisioning

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
  workflow_dispatch: # Permite rodar manualmente se precisar

jobs:
  terraform:
    name: 🏗️ Terraform Apply
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1 # Ajuste se sua regiao for outra
      TF_VAR_ssh_key_name: "genesis-key" # <--- TROQUE PELO NOME DA SUA CHAVE SE FOR DIFERENTE

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Plan
        run: terraform plan
        working-directory: ./terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./terraform

      - name: Output EC2 Public IP
        run: terraform output ec2_public_ip
        working-directory: ./terraform

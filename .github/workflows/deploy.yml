name: CD — Deploy to AWS EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    # Garantimos que o deploy só ocorra se o push for na main (redundante mas seguro)
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AWS_EC2_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Caminho absoluto para o projeto
            PROJECT_DIR="/home/ubuntu/lp-engine"

            if [ ! -d "$PROJECT_DIR" ]; then
              git clone https://github.com/${{ github.repository }}.git $PROJECT_DIR
            fi
            
            cd $PROJECT_DIR
            git fetch origin main
            git reset --hard origin/main
            
            # Garante que o arquivo .env existe e tem as chaves
            cat <<EOF > .env
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            DB_HOST=${{ secrets.RDS_ENDPOINT }}
            DB_USER=postgres
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=postgres
            EOF
            
            # Sobe a stack com permissão de superusuário se necessário
            sudo docker-compose -f infra/docker-compose.prod.yml up -d --build
            
            # Limpeza de recursos órfãos
            sudo docker image prune -f

name: CI — LP Engine

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: Qualidade de Código (Lint) ────────────────────────────────────
  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Verificar formatação e padrões de código
        run: pnpm lint

  # ─── Job 2: Testes Automatizados (TDD) ────────────────────────────────────
  test:
    name: 🧪 Testes
    runs-on: ubuntu-latest
    needs: lint  # Só roda se o lint passou
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Gerar Prisma Client
        run: pnpm --filter @lp-engine/database exec prisma generate

      - name: Rodar todos os testes
        run: pnpm test

  # ─── Job 3: Validação do Terraform ────────────────────────────────────────
  terraform:
    name: 🏗️ Terraform Plan
    runs-on: ubuntu-latest
    needs: test  # Só roda se testes passaram
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

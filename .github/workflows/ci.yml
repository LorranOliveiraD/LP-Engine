name: CI — LP Engine

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: Qualidade de Código (Lint) ────────────────────────────────────
  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Verificar formatação e padrões de código
        run: pnpm lint

  # ─── Job 2: Testes Automatizados (TDD) ────────────────────────────────────
  test:
    name: 🧪 Unit/Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: genesis
          POSTGRES_PASSWORD: genesis
          POSTGRES_DB: genesis
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://genesis:genesis@localhost:5432/genesis?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Gerar Prisma Client
        run: pnpm --filter @lp-engine/database exec prisma generate

      - name: Aplicar Schema ao Banco de Teste
        run: pnpm db:push && pnpm --filter @lp-engine/database run db:seed

      - name: Rodar todos os testes
        run: pnpm test

  # ─── Job 3: Testes de Ponta a Ponta (E2E) ──────────────────────────────────
  e2e:
    name: 🎭 E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: genesis
          POSTGRES_PASSWORD: genesis
          POSTGRES_DB: genesis
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://genesis:genesis@localhost:5432/genesis?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Gerar Prisma Client
        run: pnpm --filter @lp-engine/database exec prisma generate

      - name: Aplicar Migrações/Schema ao Banco
        run: pnpm db:push && pnpm --filter @lp-engine/database run db:seed

      - name: Instalar Navegadores do Playwright
        run: pnpm --filter dashboard exec playwright install --with-deps chromium

      - name: Iniciar API e Worker em Background
        run: |
          pnpm --filter @lp-engine/api dev &
          pnpm --filter @lp-engine/worker dev &
          sleep 15 # Aguarda um pouco mais para garantir que subiram

      - name: Rodar Testes E2E (Dashboard)
        run: pnpm --filter dashboard exec playwright test

      - name: Upload de Artefatos (Screenshots/Videos em caso de falha)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/dashboard/playwright-report/
          retention-days: 7

  # ─── Job 4: Validação do Terraform ────────────────────────────────────────
  terraform:
    name: 🏗️ Terraform Plan
    runs-on: ubuntu-latest
    needs: [test, e2e]  # Só roda se testes unitários e E2E passaram
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

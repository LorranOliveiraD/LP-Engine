version: '3.8'

services:
  # Redis para Fila
  redis:
    image: redis:7-alpine
    container_name: lp_engine_redis_prod
    ports:
      - "6379:6379"
    volumes:
      - redis_data_prod:/data
    restart: always

  # API Backend
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: lp_engine_api_prod
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}/${DB_NAME}?schema=public
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - redis
    restart: always

  # Worker de IA
  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    container_name: lp_engine_worker_prod
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}/${DB_NAME}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      - redis
    restart: always

  # Dashboard Frontend
  dashboard:
    build:
      context: ..
      dockerfile: apps/dashboard/Dockerfile
    container_name: lp_engine_dashboard_prod
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}/${DB_NAME}?schema=public
    ports:
      - "3002:3000"
    depends_on:
      - api
    restart: always

  # --- Observabilidade (Dia 36-37) ---
  prometheus:
    image: prom/prometheus:latest
    container_name: lp_engine_prometheus_prod
    volumes:
      - ../infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data_prod:/prometheus
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: lp_engine_grafana_prod
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_SERVER_HTTP_PORT=3001
    volumes:
      - grafana_data_prod:/var/lib/grafana
    ports:
      - "3001:3001"
    depends_on:
      - prometheus
    restart: always

volumes:
  redis_data_prod:
  prometheus_data_prod:
  grafana_data_prod:
